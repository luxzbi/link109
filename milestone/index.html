<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MILESTONE — Search</title>
  <style>
    :root {
      --mint: #2dd4bf;
      --bg: #040707;
      --search-bg: #0a0f0f;
      --card-bg: rgba(255,255,255,0.035);
      --card-border: rgba(255,255,255,0.07);
      --text: #e8edf0;
      --sub: #445a58;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 35% at 50% 0%, rgba(45,212,191,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      z-index: 1;
      transition: min-height 0.5s cubic-bezier(0.4,0,0.2,1), padding 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    .hero.shrunk {
      min-height: 160px;
      padding-top: 2rem;
      padding-bottom: 1.2rem;
      justify-content: flex-end;
      border-bottom: 1px solid rgba(255,255,255,0.055);
    }

    .back-btn {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--sub);
      text-decoration: none;
      padding: 0.28rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      transition: color 0.2s, border-color 0.2s;
      z-index: 50;
    }

    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }

    /* top-left fixed logo */
    .top-logo {
      position: fixed;
      top: 1.2rem;
      left: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      z-index: 50;
      text-decoration: none;
    }

    .top-logo .logo-mark { width: 24px; height: 24px; }

    .top-logo .logo-text {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.7);
      text-transform: uppercase;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
      transition: width 0.4s, height 0.4s;
    }

    .hero.shrunk .logo-mark { width: 20px; height: 20px; }

    .logo {
      font-size: 1.75rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.88);
      line-height: 1;
      transition: font-size 0.4s cubic-bezier(0.4,0,0.2,1);
      text-transform: uppercase;
    }

    .hero.shrunk .logo { font-size: 1.05rem; letter-spacing: 0.4em; }

    .logo-sub {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: var(--sub);
      letter-spacing: 0.06em;
      font-weight: 400;
    }

    .hero.shrunk .logo-sub { display: none; }

    /* ── Search ring ── */
    .ring-wrap {
      position: relative;
      width: 100%;
      border-radius: 999px;
    }

    /* ── traveling beam ── */
    .beam {
      position: absolute;
      width: 72px;
      height: 1.5px;
      border-radius: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(45,212,191,0.25) 20%,
        rgba(45,212,191,0.8) 45%,
        rgba(255,255,255,0.95) 55%,
        rgba(45,212,191,0.8) 65%,
        rgba(45,212,191,0.25) 80%,
        transparent 100%
      );
      offset-distance: 0%;
      offset-rotate: auto;
      offset-anchor: 50% 50%;
      opacity: 0;
      z-index: 3;
      pointer-events: none;
    }

    .beam.go { animation: beam-travel 0.78s linear forwards; }

    @keyframes beam-travel {
      0%   { offset-distance: 0%;   opacity: 1; }
      85%  { opacity: 1; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    /* ── Search area wrapper ── */
    .search-area {
      width: 100%;
      max-width: 620px;
      margin-top: 2.8rem;
      transition: margin-top 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .hero.shrunk .search-area { margin-top: 1rem; }

    /* ── Search box (rounded rect, not pill — chips live inside) ── */
    .search-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      background: var(--search-bg);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 0.85rem 1.1rem 0.7rem 1.1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }

    .search-icon {
      font-size: 0.88rem;
      opacity: 0.3;
      flex-shrink: 0;
    }

    #q {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.97rem;
      font-weight: 400;
    }

    #q::placeholder { color: var(--sub); font-weight: 300; }

    .search-clear {
      background: none;
      border: none;
      color: var(--sub);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
      flex-shrink: 0;
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }

    .search-clear.visible { opacity: 0.5; }
    .search-clear:hover { color: var(--mint); opacity: 1; }

    /* ── Mode selector (Gemini-style dropdown) ── */
    .mode-bar {
      padding-left: 1.5rem;
      position: relative;
    }

    .mode-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.38rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px;
      padding: 0.28rem 0.65rem 0.28rem 0.55rem;
      color: var(--sub);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      user-select: none;
      letter-spacing: 0.02em;
    }

    .mode-btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.16);
      color: var(--text);
    }

    .mode-btn.open {
      background: rgba(45,212,191,0.08);
      border-color: rgba(45,212,191,0.3);
      color: var(--mint);
    }

    .mode-chevron {
      font-size: 0.6rem;
      opacity: 0.5;
      transition: transform 0.2s;
      display: inline-block;
    }

    .mode-btn.open .mode-chevron { transform: rotate(90deg); }

    /* dropdown menu */
    .mode-dropdown {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 1.5rem;
      min-width: 180px;
      background: #141a1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 0.4rem;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
      animation: drop-in 0.18s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes drop-in {
      from { opacity: 0; transform: translateY(6px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .mode-dropdown.open { display: block; }

    .mode-option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0.8rem;
      border-radius: 9px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.65);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }

    .mode-option:hover {
      background: rgba(255,255,255,0.07);
      color: var(--text);
    }

    .mode-option.active {
      background: rgba(45,212,191,0.1);
      color: var(--mint);
    }

    .mode-option-icon { font-size: 0.88rem; width: 1.2rem; text-align: center; }

    /* ── Glow states ── */
    /* after beam completes: flash */
    .ring-wrap.glowing .search-inner {
      border-color: rgba(45,212,191,0.6);
      box-shadow:
        0 0 0 1px rgba(45,212,191,0.15),
        0 0 22px rgba(45,212,191,0.2),
        0 0 55px rgba(45,212,191,0.09),
        0 16px 50px rgba(0,0,0,0.5);
      transition: border-color 0.1s, box-shadow 0.1s;
    }

    .ring-wrap.glow-out .search-inner {
      border-color: rgba(255,255,255,0.08);
      box-shadow: none;
      transition: border-color 1.4s ease, box-shadow 1.4s ease;
    }

    /* while typing: persistent soft glow */
    .ring-wrap.typing .search-inner {
      border-color: rgba(45,212,191,0.35);
      box-shadow:
        0 0 0 1px rgba(45,212,191,0.08),
        0 0 28px rgba(45,212,191,0.13),
        0 0 60px rgba(45,212,191,0.06),
        0 16px 50px rgba(0,0,0,0.55);
    }

    /* ── Results ── */
    #results {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2rem 4rem;
      position: relative;
      z-index: 1;
    }

    .results-meta {
      font-size: 0.75rem;
      color: var(--sub);
      margin-bottom: 1.2rem;
      letter-spacing: 0.04em;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.7rem;
    }

    .r-card {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.75rem 0.9rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .r-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, rgba(45,212,191,0.8), rgba(45,212,191,0.2));
      border-radius: 3px 0 0 3px;
    }

    .r-card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(45,212,191,0.3);
      transform: translateY(-2px);
    }

    .r-icon { font-size: 1rem; flex-shrink: 0; }

    .r-text { overflow: hidden; }

    .r-name {
      font-size: 0.84rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .r-meta {
      font-size: 0.68rem;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .src-badge {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: 4px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .src-hw { background: rgba(250,204,21,0.12); color: #facc15; border: 1px solid rgba(250,204,21,0.25); }
    .src-gw { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
    .src-ms { background: rgba(45,212,191,0.12); color: #2dd4bf; border: 1px solid rgba(45,212,191,0.25); }

    .badge-haktuksa {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #34d399;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.3);
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
      flex-shrink: 0;
      vertical-align: middle;
      margin-left: 2px;
    }

    .empty {
      text-align: center;
      padding: 5rem 0;
      color: var(--sub);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.68rem;
      color: rgba(107,138,138,0.4);
      border-top: 1px solid rgba(255,255,255,0.04);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 640px) {
      /* 상단 고정 요소 */
      .top-logo { top: 0.85rem; left: 1rem; }
      .top-logo .logo-mark { width: 18px; height: 18px; }
      .top-logo .logo-text { font-size: 0.75rem; letter-spacing: 0.18em; }
      .back-btn { top: 0.85rem; right: 1rem; font-size: 0.68rem; padding: 0.22rem 0.65rem; }

      /* 중앙 hero 로고 — 모바일에서도 검색박스 위에 표시, 검색 중엔 숨김 */
      .logo { font-size: 1.3rem; letter-spacing: 0.28em; }
      .logo-sub { display: block; font-size: 0.65rem; }
      .hero.shrunk .logo { display: none; }
      .hero.shrunk .logo-sub { display: none; }

      /* hero: 검색창만 보이도록 */
      .hero {
        min-height: 100dvh;
        padding: 1rem;
        justify-content: center;
      }

      /* 검색 중: hero를 화면 상단에 딱 붙여서 검색창이 잘 보이도록 */
      .hero.shrunk {
        min-height: 0;
        height: auto;
        padding-top: 4rem;   /* top-logo/back-btn 높이 확보 */
        padding-bottom: 0.8rem;
        justify-content: flex-start;
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--bg);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }

      .search-area { max-width: 100%; margin-top: 0; }
      .hero.shrunk .search-area { margin-top: 0; }
      .search-inner { border-radius: 14px; padding: 0.7rem 0.85rem 0.6rem; }
      #q { font-size: 16px; }

      /* 빛 애니메이션 모바일에서 비활성화 */
      .beam.go { animation: none !important; opacity: 0 !important; }

      .mode-dropdown { min-width: 160px; bottom: calc(100% + 6px); }
      #results { padding: 1rem 0.85rem 3rem; }
      .results-grid { grid-template-columns: 1fr 1fr; gap: 0.45rem; }
      .r-card { padding: 0.55rem 0.65rem; }
      .r-name { font-size: 0.76rem; }
      .src-badge { display: none; }
    }

    @media (max-width: 380px) {
      .results-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  {n:'유웨이',             u:'https://www.uway.com',               d:'대입 전략',                  c:'입시·진로',     s:'GATEWAY', i:'🗺️'},
  {n:'커리어넷',           u:'https://www.career.go.kr',           d:'적성검사·직업 탐색',         c:'입시·진로',     s:'GATEWAY', i:'🧭'},
  {n:'LinkedIn',           u:'https://www.linkedin.com',           d:'글로벌 커리어',              c:'입시·진로',     s:'GATEWAY', i:'💼'},
  {n:'Wanted',             u:'https://www.wanted.co.kr',           d:'IT 채용',                    c:'입시·진로',     s:'GATEWAY', i:'🎯'},
  // ── 시간관리·집중 ──
  {n:'Google Calendar',    u:'https://calendar.google.com',        d:'일정 관리',                  c:'시간관리·집중', s:'GATEWAY', i:'📅'},
  {n:'열품타',             u:'https://www.yeolpumta.com',          d:'공부 시간 측정',             c:'시간관리·집중', s:'GATEWAY', i:'🔥'},
  {n:'Todoist',            u:'https://todoist.com',                d:'투두 리스트',                c:'시간관리·집중', s:'GATEWAY', i:'📋'},

  {n:'Pomofocus',          u:'https://pomofocus.io',               d:'뽀모도로 타이머',            c:'시간관리·집중', s:'GATEWAY', i:'🍅'},
  {n:'네이버 캘린더',      u:'https://calendar.naver.com',         d:'일정·D-day',                 c:'시간관리·집중', s:'GATEWAY', i:'🗓️'},
];

// State
let filterSrc = '';
let query = '';

const hero = document.getElementById('hero');
const ring = document.getElementById('ring');
const input = document.getElementById('q');
const clr = document.getElementById('clr');
const results = document.getElementById('results');
const grid = document.getElementById('grid');
const meta = document.getElementById('meta');

// Beam animation — 페이지 진입 시 1회, 모바일 제외
const beam = document.getElementById('beam');
const isMobileDevice = () => window.innerWidth <= 640;

function triggerBeam() {
  if (isMobileDevice()) return;
  const w = ring.offsetWidth;
  const h = ring.offsetHeight;
  const r = 20; // border-radius matches CSS 20px
  // Rounded-rect path clockwise from top-center
  const path = `M ${w/2},0 H ${w-r} A ${r},${r} 0 0,1 ${w},${r} V ${h-r} A ${r},${r} 0 0,1 ${w-r},${h} H ${r} A ${r},${r} 0 0,1 0,${h-r} V ${r} A ${r},${r} 0 0,1 ${r},0 H ${w/2}`;
  beam.style.offsetPath = `path('${path}')`;
  beam.classList.remove('go');
  ring.classList.remove('glowing', 'glow-out');
  void beam.offsetWidth;
  beam.classList.add('go');
}

// 페이지 진입 시 자동 실행
window.addEventListener('load', () => { setTimeout(triggerBeam, 400); });

beam.addEventListener('animationend', () => {
  beam.classList.remove('go');
  ring.classList.remove('glow-out');
  ring.classList.add('glowing');
  setTimeout(() => {
    ring.classList.remove('glowing');
    // if still typing, go to typing glow; else fade out
    if (input.value.length > 0) {
      ring.classList.add('typing');
    } else {
      ring.classList.add('glow-out');
    }
  }, 350);
});

// Search
let debounceTimer = null;

input.addEventListener('input', () => {
  query = input.value;
  clr.classList.toggle('visible', query.length > 0);

  if (query.length > 0) {
    ring.classList.add('typing');
    ring.classList.remove('glow-out');
    hero.classList.add('shrunk');
    results.style.display = 'block';
  } else {
    ring.classList.remove('typing');
    hero.classList.remove('shrunk');
    results.style.display = 'none';
  }

  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 120);
});

clr.addEventListener('click', () => {
  input.value = '';
  query = '';
  clr.classList.remove('visible');
  hero.classList.remove('shrunk');
  results.style.display = 'none';
  input.focus();
});

// Mode dropdown
const modeBtn = document.getElementById('modeBtn');
const modeDropdown = document.getElementById('modeDropdown');
const modeLabel = document.getElementById('modeLabel');

modeBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const open = modeDropdown.classList.toggle('open');
  modeBtn.classList.toggle('open', open);
});

document.addEventListener('click', () => {
  modeDropdown.classList.remove('open');
  modeBtn.classList.remove('open');
});

document.querySelectorAll('.mode-option').forEach(opt => {
  opt.addEventListener('click', (e) => {
    e.stopPropagation();
    document.querySelectorAll('.mode-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    filterSrc = opt.dataset.src;
    modeLabel.textContent = opt.dataset.label;
    modeDropdown.classList.remove('open');
    modeBtn.classList.remove('open');
    render();
  });
});

const CHOSUNG = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];

function toChosung(str) {
  return str.split('').map(ch => {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code < 0 || code > 11171) return ch;
    return CHOSUNG[Math.floor(code / (21 * 28))];
  }).join('');
}

function korMatch(text, q) {
  const t = text.toLowerCase();
  if (t.includes(q)) return true;
  // 초성/자음만 입력한 경우
  if (/^[ㄱ-ㅎ]+$/.test(q)) return toChosung(t).includes(q);
  return false;
}

function render() {
  const q = query.trim().toLowerCase();
  const filtered = LINKS.filter(l => {
    if (filterSrc && l.s !== filterSrc) return false;
    if (!q) return true;
    return korMatch(l.n + l.d + l.c + l.u, q);
  });

  meta.textContent = q ? `"${query}" — ${filtered.length}개 결과` : `${filtered.length}개`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">검색 결과가 없습니다</div>';
    return;
  }

  const srcLabel = {HIGHWAY:'HIGHWAY', GATEWAY:'GATEWAY', MILESTONE:'MILESTONE'};
  const srcClass = {HIGHWAY:'src-hw', GATEWAY:'src-gw', MILESTONE:'src-ms'};

  grid.innerHTML = filtered.map(l => `
    <a class="r-card" href="${l.u}" target="_blank" rel="noopener">
      <span class="r-icon">${l.i}</span>
      <div class="r-text">
        <div class="r-name">${l.n} <span class="src-badge ${srcClass[l.s]}">${srcLabel[l.s]}</span>${l.haktuksa ? '<span class="badge-haktuksa">학특사</span>' : ''}</div>
        <div class="r-meta">${l.d} · ${l.c}</div>
      </div>
    </a>
  `).join('');
}
</script>
